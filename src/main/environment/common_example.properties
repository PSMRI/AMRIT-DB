spring.application.name=Amrit-DB


spring.datasource.tomcat.initial-size=5
spring.datasource.tomcat.max-active=30
spring.datasource.tomcat.max-idle=15
spring.datasource.tomcat.min-idle=5
spring.datasource.tomcat.min-evictable-idle-time-millis=15000
spring.datasource.tomcat.remove-abandoned=true
spring.application.name=Amrit-DB

### JDBC / Pool (Tomcat) - tuning for local dev
# Initial and max connections for the Tomcat JDBC pool used by Spring datasource
spring.datasource.tomcat.initial-size=5
spring.datasource.tomcat.max-active=30
spring.datasource.tomcat.max-idle=15
spring.datasource.tomcat.min-idle=5
spring.datasource.tomcat.min-evictable-idle-time-millis=15000
spring.datasource.tomcat.remove-abandoned=true
spring.datasource.tomcat.logAbandoned=true
spring.datasource.continue-on-error=true
spring.datasource.tomcat.remove-abandoned-timeout=600

### JPA / Hibernate settings (local fallback)
# Naming strategies and DDL mode. For CLI-only runs this is harmless; adjust as needed
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming_strategy=org.hibernate.cfg.EJB3NamingStrategy
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

spring.datasource.db-iemr.jdbc-url=jdbc:mysql://localhost:3306/dbiemr
spring.datasource.db-iemr.username=root
spring.datasource.db-iemr.password=1234
spring.datasource.db-iemr.driver-class-name=com.mysql.cj.jdbc.Driver

### Multiple datasources (example local connection strings)
# Source/target schemas used by the anonymizer are separate logical schemas (databases)
spring.datasource.db-identity.jdbc-url=jdbc:mysql://localhost:3306/db_identity
spring.datasource.db-identity.username=root
spring.datasource.db-identity.password=1234
spring.datasource.db-identity.driver-class-name=com.mysql.cj.jdbc.Driver

#db_reporting
spring.datasource.db-reporting.jdbc-url=jdbc:mysql://localhost:3306/db_reporting
spring.datasource.db-reporting.username=root
spring.datasource.db-reporting.password=1234
spring.datasource.db-reporting.driver-class-name=com.mysql.cj.jdbc.Driver

# 1097 db_identity
spring.datasource.db-1097-identity.jdbc-url=jdbc:mysql://localhost:3306/db_1097_identity
spring.datasource.db-1097-identity.username=root
spring.datasource.db-1097-identity.password=1234
spring.datasource.db-1097-identity.driver-class-name=com.mysql.cj.jdbc.Driver

### Flyway (database migrations)
# Disabled for local CLI runs - migrations are not executed by anonymizer by default
spring.flyway.locations=classpath:db/migration/dbiemr,classpath:db/migration/dbidentity,classpath:db/migration/dbreporting,classpath:db/migration/db1097identity
spring.flyway.validateMigrationNaming=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.migrate=true
spring.flyway.validate-on-migrate=false


logging.level.org.flywaydb=DEBUG
logging.level.org.springframework=DEBUG
anonymizer.loggingPath=./logs

# If true, the CLI will treat target as read-only and will not write data
#anonymizer.target.readOnly=false

### Performance tuning for large runs
# Batch size controls rows per INSERT batch; fetchSize controls JDBC fetch window
anonymizer.performance.batchSize=1000
anonymizer.performance.fetchSize=1000
anonymizer.performance.maxMemoryMb=512

# Rules file path (source of truth for per-table/column strategies)
anonymizer.rulesFile=src/main/resources/anonymizer/anonymization-registry.yml

### Safety and operation
# When enabled, safety checks enforce allowed hosts and require explicit approval
anonymizer.safety.enabled=true
# Comma-separated allowed hosts for safe runs (use localhost for local testing)
anonymizer.safety.allowedHosts=localhost


### Secrets
# HMAC secret key used for deterministic HMAC anonymization. Prefer setting via environment variable
# Example (PowerShell): $env:HMAC_SECRET_KEY = "$(openssl rand -hex 32)"
# If you want to keep it in properties for local testing, set it here (NOT recommended for real data)
#anonymizer.hmacSecretKey=

# Default dry run mode: if true the CLI validates configuration and safety but does not write data
anonymizer.dryRun=true

# Map logical schema names used in rules -> physical database names on this server
# Example: anonymizer.schema.map.dbiemr=db_iemr will resolve logical 'dbiemr' to physical 'db_iemr'
anonymizer.schema.map.dbiemr=db_iemr

# Target (DB2) JDBC — used by RunCommand to create write DataSource
# Replace the values below with your DB2 (target) host, port, schema and credentials for all dbs
#spring.datasource.db-identity.jdbc-url=jdbc:mysql://db2-host.example.com:3306/target_schema?useSSL=false&serverTimezone=UTC
#spring.datasource.db-identity.username=target_user
#spring.datasource.db-identity.password=target_password

# Optional: explicitly list target schemas (comma-separated) if different or multiple
anonymizer.target.schemas=target_schema

# Make sure writes are allowed (DirectRestoreWriter requires target.readOnly=false)
anonymizer.target.readOnly=false

# Connection tuning for target
anonymizer.target.connectionTimeout=30000
anonymizer.target.verifyServerCertificate=true

# Performance tuning (optional)
anonymizer.performance.batchSize=1000
anonymizer.performance.fetchSize=1000